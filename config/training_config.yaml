# Training Configuration for RLInfra Distributed ML Platform

model:
  name: "PolicyModel"
  vocab_size: 32000
  hidden_dim: 1024
  num_layers: 16
  num_heads: 16

distributed:
  backend: "gloo"             # Use gloo for local/mac compatibility, nccl on GPU servers
  sharding_strategy: "full_shard" # full_shard, shard_grad_op, no_shard
  mixed_precision: "fp16"     # fp16, bf16, fp32
  cpu_offload: true           # Offload FSDP weights to CPU to save memory

pipeline:
  async_loading: true
  num_workers: 4
  queue_capacity: 10
  episode_length: 512
  batch_size: 32

profiler:
  enabled: true
  wait_steps: 2
  warmup_steps: 2
  active_steps: 5
  repeat: 1
  export_path: "./profiler_traces"

mlflow:
  experiment_name: "RLInfra-Distributed-Training"
  tracking_uri: "http://localhost:5000"
  log_every_steps: 10
